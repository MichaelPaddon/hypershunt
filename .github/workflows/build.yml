name: Build Project

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install system dependencies
      # pandoc: build.rs regenerates docs/manual.md from docs/hypershunt.1.
      run: sudo apt-get install -y libpam0g-dev pandoc

    # Cache the compiled dependency graph (heavy: aws-lc-rs/cmake, quinn,
    # rustls, …).  On a warm cache the deps are restored instead of
    # recompiled, which is where almost all the build time goes.
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: build          # debug-profile cache, stable across branches

    - name: Build
      run: cargo build --verbose

    - name: Check man page + Markdown mirror are in sync
      # `cargo build` ran build.rs, which (1) synced the man page's .TH
      # version to the crate version and (2) regenerated docs/manual.md.
      # A diff here means docs/hypershunt.1 or docs/manual.md was left
      # stale (e.g. a version bump or man-page edit wasn't rebuilt+committed).
      run: |
        git diff --exit-code docs/hypershunt.1 docs/manual.md \
          || { echo "::error::docs/hypershunt.1 or docs/manual.md is stale — run 'cargo build' and commit the result"; exit 1; }

    - name: Run tests
      run: cargo test --verbose

  integration-test:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v6

    - name: Install system dependencies
      run: sudo apt-get install -y libpam0g-dev podman

    # Distinct key from the build job: smoke.sh compiles in the release
    # profile (lto=thin, opt-level=3), so its dep artifacts differ and
    # must not clobber the debug cache.
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: integration    # release-profile cache

    # smoke.sh builds the release binary + the h3get / h2c_connect_echo
    # example helpers, builds the test container, and runs the suite.
    # The same script is the documented local entry point, so the recipe
    # lives in exactly one place.
    - name: Run integration tests
      run: tests/integration/smoke.sh
