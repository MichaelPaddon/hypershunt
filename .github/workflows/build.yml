name: Build Project

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install system dependencies
      # pandoc: build.rs regenerates docs/manual.md from docs/hypershunt.1.
      run: sudo apt-get install -y libpam0g-dev pandoc

    - name: Build
      run: cargo build --verbose

    - name: Check man-page Markdown mirror is in sync
      # `cargo build` ran build.rs, which regenerated docs/manual.md from
      # the man page.  If it differs from the committed copy, someone
      # edited docs/hypershunt.1 without regenerating the mirror.
      run: |
        git diff --exit-code docs/manual.md \
          || { echo "::error::docs/manual.md is stale — edit docs/hypershunt.1, run 'cargo build', and commit docs/manual.md"; exit 1; }

    - name: Run tests
      run: cargo test --verbose

  integration-test:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v6

    - name: Install system dependencies
      run: sudo apt-get install -y libpam0g-dev podman

    - name: Build release binary
      run: cargo build --release

    - name: Build h3get HTTP/3 test client
      # Used by the integration container to exercise the QUIC
      # listener; Debian's packaged curl lacks --http3 support.
      run: cargo build --release --example h3get

    - name: Build h2c_connect_echo test backend
      # Used by suite_websocket_h1_h2c to drive hypershunt's h1<->h2c
      # upgrade bridge against a real h2 prior-knowledge server.
      run: cargo build --release --example h2c_connect_echo

    - name: Build test container
      run: >
        podman build
        -f tests/integration/Containerfile
        -t hypershunt-test
        .

    - name: Run integration tests
      run: podman run --rm hypershunt-test
