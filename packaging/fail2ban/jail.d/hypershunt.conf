[hypershunt]
# Ban clients that fail HTTP authentication too many times.
# Set enabled = true to activate; adjust maxretry/bantime to taste.
# Reads directly from the systemd journal — no log file path needed.
enabled      = false
backend      = systemd
journalmatch = _SYSTEMD_UNIT=hypershunt.service
filter       = hypershunt
maxretry     = 5
findtime     = 300
bantime      = 3600
