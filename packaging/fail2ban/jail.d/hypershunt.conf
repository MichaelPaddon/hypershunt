# fail2ban jails for hypershunt.
#
# Each jail reads the systemd journal and bans the real client IP for a
# distinct security event.  ALL are disabled by default -- set
# `enabled = true` on the ones you want and tune the thresholds.
# (backend/journalmatch are repeated per jail on purpose: a [DEFAULT]
# section here would leak into every other service's jails.)
#
# Thresholds read as maxretry / findtime / bantime, i.e. "ban an IP that
# produces <maxretry> matching events within <findtime>, for <bantime>".
#
# Tips:
#   - Exempt your own admin / monitoring / CI networks so you can't
#     self-ban (loopback is already exempt by fail2ban's global default):
#       ignoreip = 127.0.0.1/8 ::1 10.0.0.0/8 192.0.2.0/24
#   - For repeat offenders, prefer escalating bans over one long fixed
#     ban: set `bantime.increment = true` in /etc/fail2ban/fail2ban.local.

# Rejected credentials: bad password, invalid bearer token, or invalid /
# expired session cookie.  The primary jail.  A benign 401 challenge with
# NO credentials is logged as `auth-challenge` and is deliberately not
# matched, so a user who merely hits a protected page is never banned.
# 5 rejected logins in 10m -> ban 1h.
[hypershunt-auth]
enabled      = false
backend      = systemd
journalmatch = _SYSTEMD_UNIT=hypershunt.service
filter       = hypershunt[event=auth-failure]
maxretry     = 5
findtime     = 10m
bantime      = 1h

# Access-policy denials (IP / geo / group -> 403, plus raw-TCP
# stream-proxy denials).  CAVEAT: this amplifies -- one page load by a
# denied client emits a 403 per sub-resource (CSS/JS/images), so a single
# click can be 10-30 events.  maxretry is deliberately high so a legit-
# but-unauthorized client isn't banned instantly; this jail mainly catches
# path scanners.  Tune to your app.  20 in 10m -> ban 1h.
[hypershunt-access]
enabled      = false
backend      = systemd
journalmatch = _SYSTEMD_UNIT=hypershunt.service
filter       = hypershunt[event=access-denied]
maxretry     = 20
findtime     = 10m
bantime      = 1h

# Rate-limit (429) floods.  The rate limiter already throttles; this only
# escalates a *sustained* flood to an IP ban, so give bursty-but-legit
# clients headroom.  30 in 1m -> ban 10m.
[hypershunt-ratelimit]
enabled      = false
backend      = systemd
journalmatch = _SYSTEMD_UNIT=hypershunt.service
filter       = hypershunt[event=rate-limited]
maxretry     = 30
findtime     = 1m
bantime      = 10m

# Rejected mTLS client certificate (no cert / untrusted / expired /
# revoked).  High-confidence -- a valid cert never trips it, and only
# fires when client-cert auth is on.  3 in 10m -> ban 1h.
[hypershunt-mtls]
enabled      = false
backend      = systemd
journalmatch = _SYSTEMD_UNIT=hypershunt.service
filter       = hypershunt[event=bad-client-cert]
maxretry     = 3
findtime     = 10m
bantime      = 1h
