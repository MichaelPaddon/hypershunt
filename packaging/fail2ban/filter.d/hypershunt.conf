# fail2ban filter for hypershunt.
#
# hypershunt emits security events on a dedicated, stable log target
# `hypershunt::security`, one distinct kebab-case token per scenario, e.g.
#   2026-06-06T12:34:56Z WARN hypershunt::security: auth-failure peer=1.2.3.4:5678 method=GET path="…" host="…"
#
# This is a PARAMETRIZED filter: the `event` token selects which scenario
# to match.  The jail passes it, e.g. `filter = hypershunt[event=auth-failure]`.
# Known tokens: auth-failure, access-denied, rate-limited, bad-client-cert
# (auth-challenge is the benign "no credentials" case and is intentionally
# not a ban target).
#
# `peer=` is the real accepted socket address and always precedes any
# request-derived field, so a crafted path/host/username can neither forge
# nor evade a match (request strings are escaped by the logger anyway).

[INCLUDES]
before = common.conf

[Init]
# Default scenario; override per jail with hypershunt[event=<token>].
event = auth-failure

[Definition]
failregex = hypershunt::security: %(event)s peer=<HOST>:\d+\b

ignoreregex =
