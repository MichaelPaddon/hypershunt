<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>hypershunt</title>
  <link rel="icon" type="image/svg+xml" href="hypershunt-favicon.svg">
  <link rel="stylesheet" href="vendor/vue.css">
  <style>
    /* Theme variables.  vue.css hardcodes its colours (it exposes only
       --theme-color), so dark mode can't be a variable swap of the
       theme itself; instead we drive our *own* custom surfaces (cards,
       KDL palette) from these vars and override docsify's chrome
       explicitly in the [data-theme="dark"] block further down. */
    :root {
      --hs-card-bg: #fafdff;
      --hs-card-shadow: rgba(0, 0, 0, 0.07);
      --hs-kdl-keyword: #c0392b;
      --hs-kdl-property: #2980b9;
      --hs-kdl-string: #16a085;
      --hs-kdl-litnum: #8e44ad;
      --hs-kdl-comment: #7f8c8d;
      --hs-kdl-punct: #34495e;
    }
    :root[data-theme="dark"] {
      --hs-card-bg: #1b2733;
      --hs-card-shadow: rgba(0, 0, 0, 0.5);
      /* Same hues as light, lifted in lightness for a dark ground. */
      --hs-kdl-keyword: #e74c3c;
      --hs-kdl-property: #5dade2;
      --hs-kdl-string: #48c9b0;
      --hs-kdl-litnum: #bb8fce;
      --hs-kdl-comment: #95a5a6;
      --hs-kdl-punct: #aab7c4;
    }

    /* Slightly tighter sidebar font + better code blocks. */
    .sidebar { font-size: 14.5px; }
    pre[data-lang] { position: relative; }

    /* Home-page card grid: home.md wraps its link list in
       <div class="cards"> -- each consecutive paragraph
       containing a link becomes a card. */
    .markdown-section .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
      margin: 2rem 0;
    }
    .markdown-section .cards p {
      margin: 0;
      padding: 1.1rem 1.2rem;
      border: 1px solid var(--theme-color, #42b983);
      border-radius: 8px;
      background: var(--hs-card-bg);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .markdown-section .cards p:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px var(--hs-card-shadow);
    }
    .markdown-section .cards p a {
      font-weight: 700;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 0.3rem;
    }
    .markdown-section .cards p a:hover { text-decoration: underline; }

    /* KDL syntax-highlight palette (driven by the theme vars above). */
    .token.keyword { color: var(--hs-kdl-keyword); font-weight: 600; }
    .token.property, .token.attr-name { color: var(--hs-kdl-property); }
    .token.string { color: var(--hs-kdl-string); }
    .token.boolean, .token.number { color: var(--hs-kdl-litnum); }
    .token.comment { color: var(--hs-kdl-comment); font-style: italic; }
    .token.punctuation { color: var(--hs-kdl-punct); }

    /* On-page table of contents (docsify-plugin-toc).  The plugin
       inserts <aside class="toc-nav"> immediately before .content and
       fills it with a .page_toc tree.  Only shown on wide viewports:
       below the breakpoint there isn't room beside the centered
       content column, so it is hidden and readers fall back to the
       in-page headings docsify nests under the active sidebar item. */
    .toc-nav { display: none; }
    @media screen and (min-width: 1200px) {
      .toc-nav {
        display: block;
        position: fixed;
        top: 0; right: 0; bottom: 0;
        width: 17rem;
        box-sizing: border-box;
        padding: 70px 1.2rem 2rem 1.2rem;
        overflow-y: auto;
        font-size: 13px;
        border-left: 1px solid #eee;
      }
      /* Pull the content column in so the TOC strip doesn't overlap it.
         When the page has no headings the plugin tags the aside
         `.nothing`; reclaim the space then (home/cover pages). */
      .toc-nav + .content { right: 17rem; }
      .toc-nav.nothing { display: none; }
      .toc-nav.nothing + .content { right: 0; }
    }
    .toc-nav .page_toc { margin: 0; }
    .toc-nav .lv2 { padding-left: 0; }
    .toc-nav .lv3 { padding-left: 0.9rem; font-size: 12.5px; }
    .toc-nav a {
      display: block;
      padding: 2px 0;
      color: #7f8c8d;
      text-decoration: none;
      line-height: 1.35;
    }
    .toc-nav a:hover { color: var(--theme-color, #42b983); }
    .toc-nav .active > a,
    .toc-nav a.active {
      color: var(--theme-color, #42b983);
      font-weight: 600;
    }

    /* Hover "#" permalink cue on headings.  docsify already wraps each
       heading's text in <a class="anchor"><span>…</span></a>, so the
       heading is a link; this only surfaces a visual affordance. */
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4 { position: relative; }
    .markdown-section h1 .anchor span::before,
    .markdown-section h2 .anchor span::before,
    .markdown-section h3 .anchor span::before,
    .markdown-section h4 .anchor span::before {
      content: "#";
      position: absolute;
      left: -0.85em;
      color: var(--theme-color, #42b983);
      opacity: 0;
      transition: opacity 0.12s ease;
    }
    .markdown-section h1:hover .anchor span::before,
    .markdown-section h2:hover .anchor span::before,
    .markdown-section h3:hover .anchor span::before,
    .markdown-section h4:hover .anchor span::before { opacity: 0.6; }

    /* Back-to-top button, injected by the inline plugin below. */
    #scroll-top {
      position: fixed;
      right: 1.2rem;
      bottom: 1.2rem;
      z-index: 30;
      display: none;
      padding: 0.4rem 0.7rem;
      font: 600 12px/1 sans-serif;
      color: #fff;
      background: var(--theme-color, #42b983);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      opacity: 0.85;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
    }
    #scroll-top:hover { opacity: 1; }
    #scroll-top.show { display: block; }

    /* Theme toggle button (injected by the inline plugin below),
       mirrored in the opposite corner from back-to-top. */
    #theme-toggle {
      position: fixed;
      left: 1.2rem;
      bottom: 1.2rem;
      z-index: 30;
      padding: 0.4rem 0.7rem;
      font: 600 12px/1 sans-serif;
      color: #fff;
      background: var(--theme-color, #42b983);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      opacity: 0.85;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
    }
    #theme-toggle:hover { opacity: 1; }

    /* ---- Dark theme ---------------------------------------------------
       vue.css hardcodes its colours, so dark mode is a set of explicit
       overrides scoped under :root[data-theme="dark"].  These rules are
       more specific than the plugin/theme defaults, so source order
       doesn't matter (e.g. flexible-alerts injects its <style> at run
       time, after this block, but our scoped selector still wins). */
    :root[data-theme="dark"] body,
    :root[data-theme="dark"] .sidebar,
    :root[data-theme="dark"] .content { background: #0f1620; }
    :root[data-theme="dark"] body { color: #c8d2dc; }
    :root[data-theme="dark"] .sidebar {
      color: #c8d2dc;
      border-right: 1px solid #243140;
    }
    :root[data-theme="dark"] .sidebar a,
    :root[data-theme="dark"] .sidebar .sidebar-nav li > a { color: #c8d2dc; }
    :root[data-theme="dark"] .app-name-link { color: #fff; }
    :root[data-theme="dark"] .markdown-section { color: #c8d2dc; }
    :root[data-theme="dark"] .markdown-section a { color: #5dade2; }
    :root[data-theme="dark"] .markdown-section h1,
    :root[data-theme="dark"] .markdown-section h2,
    :root[data-theme="dark"] .markdown-section h3,
    :root[data-theme="dark"] .markdown-section h4 { color: #e7edf3; }
    :root[data-theme="dark"] .markdown-section code,
    :root[data-theme="dark"] .markdown-section pre {
      background: #18222e;
      color: #d6dee7;
    }
    :root[data-theme="dark"] .markdown-section pre > code { background: transparent; }
    :root[data-theme="dark"] .markdown-section blockquote {
      color: #aab7c4;
      border-left-color: #3a4b5c;
    }
    :root[data-theme="dark"] .markdown-section tr { background: #0f1620; }
    :root[data-theme="dark"] .markdown-section tr:nth-child(2n) { background: #131c26; }
    :root[data-theme="dark"] .markdown-section td,
    :root[data-theme="dark"] .markdown-section th { border-color: #243140; }
    :root[data-theme="dark"] .markdown-section hr { border-bottom-color: #243140; }
    /* Search box + results */
    :root[data-theme="dark"] .search input {
      background: #18222e;
      color: #c8d2dc;
      border-color: #243140;
    }
    :root[data-theme="dark"] .search,
    :root[data-theme="dark"] .search .results-panel { border-color: #243140; }
    :root[data-theme="dark"] .search .matching-post { border-bottom: 1px solid #243140; }
    :root[data-theme="dark"] .search p { color: #aab7c4; }
    /* On-page TOC */
    :root[data-theme="dark"] .toc-nav { border-left-color: #243140; }
    :root[data-theme="dark"] .toc-nav a { color: #8b97a3; }
    /* Admonitions: keep the plugin's coloured accent, darken the fill. */
    :root[data-theme="dark"] .alert {
      background: #18222e;
      color: #c8d2dc;
    }
    /* Tabbed code blocks (docsify-tabs). */
    :root[data-theme="dark"] .docsify-tabs__content { background: #18222e; }
    :root[data-theme="dark"] .docsify-tabs__tab {
      color: #8b97a3;
      background: transparent;
    }
    :root[data-theme="dark"] .docsify-tabs__tab--active {
      color: #e7edf3;
      border-bottom-color: var(--theme-color, #42b983);
    }

    /* Cover page: a fixed theme-coloured gradient (so it doesn't depend
       on docsify's per-hash random gradient) with white text and white-
       outlined buttons; the last button is filled in the theme colour.
       Identical in light and dark — the cover is always dark-on-green. */
    section.cover {
      background: linear-gradient(135deg, #0f1620 0%, #1b3a2e 55%, #42b983 100%) !important;
    }
    section.cover .cover-main,
    section.cover .cover-main a { color: #eafff5; }
    section.cover .cover-main blockquote p { color: #d7e7df; }
    section.cover .cover-main > p:last-child a {
      border-color: #fff;
      color: #fff;
    }
    section.cover .cover-main > p:last-child a:last-child {
      background: var(--theme-color, #42b983);
      border-color: var(--theme-color, #42b983);
    }

    /* "Edit this page" footer link, appended by the inline plugin. */
    .edit-page {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid #eee;
      font-size: 13px;
      text-align: right;
    }
    .edit-page a { color: #7f8c8d; }
    :root[data-theme="dark"] .edit-page { border-top-color: #243140; }
    :root[data-theme="dark"] .edit-page a { color: #8b97a3; }
  </style>

  <!-- Apply the saved (or OS-preferred) theme before first paint so the
       page never flashes light then dark. -->
  <script>
    (function () {
      var saved = null;
      try { saved = localStorage.getItem('hs-theme'); } catch (e) {}
      var dark = saved
        ? saved === 'dark'
        : window.matchMedia &&
          window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.dataset.theme = dark ? 'dark' : 'light';
    })();
  </script>
</head>
<body>
  <div id="app">Loading documentation&hellip;</div>

  <script>
    window.$docsify = {
      name: 'hypershunt',
      repo: 'https://github.com/MichaelPaddon/hypershunt',
      logo: 'hypershunt-logo.png',
      loadSidebar: true,
      coverpage: true,
      subMaxLevel: 3,
      auto2top: true,
      relativePath: true,
      homepage: 'home.md',
      notFoundPage: false,
      search: {
        paths: 'auto',
        placeholder: 'Search docs',
        noData: 'No results.',
        depth: 4,
        namespace: 'hypershunt-docs'
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied'
      },
      executeScript: false,
      noEmoji: true,
      toc: {
        tocMaxLevel: 3,
        target: 'h2, h3'
      },
      tabs: {
        persist: true,
        sync: true,
        theme: 'classic'
      }
    };
  </script>

  <!-- docsify core + plugins, all vendored -->
  <script src="vendor/docsify.min.js"></script>
  <script src="vendor/search.min.js"></script>
  <script src="vendor/docsify-copy-code.min.js"></script>
  <script src="vendor/docsify-plugin-toc.min.js"></script>
  <!-- Admonition/callout blocks: authors write `> [!NOTE]`,
       `> [!TIP]`, `> [!WARNING]`, `> [!IMPORTANT]`, `> [!ATTENTION]`.
       The plugin injects its own styles. -->
  <script src="vendor/docsify-plugin-flexible-alerts.min.js"></script>
  <!-- Tabbed code blocks for variant commands (podman/docker, etc.).
       Comment-style tabs (<!-- tab:Label -->) are used so tab labels
       never become headings that leak into the TOC or search. The
       plugin injects its own styles. -->
  <script src="vendor/docsify-tabs.min.js"></script>

  <!-- Back-to-top button.  Inline (no dependency): a docsify plugin
       appends one fixed button and reveals it once the reader has
       scrolled past the first screen.  Plain text label, no emoji, to
       respect noEmoji. -->
  <script>
    window.$docsify.plugins = [].concat(function (hook) {
      hook.mounted(function () {
        var btn = document.createElement('button');
        btn.id = 'scroll-top';
        btn.type = 'button';
        btn.textContent = 'Top';
        btn.setAttribute('aria-label', 'Back to top');
        btn.addEventListener('click', function () {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        document.body.appendChild(btn);
        var sync = function () {
          btn.classList.toggle('show', window.scrollY > 400);
        };
        document.addEventListener('scroll', sync, { passive: true });
        sync();
      });
    }, window.$docsify.plugins || []);
  </script>

  <!-- Dark/light theme toggle.  Inline (no dependency): flips the
       data-theme attribute the head script seeds and persists the
       choice. Plain-text label, no emoji. -->
  <script>
    window.$docsify.plugins = [].concat(function (hook) {
      hook.mounted(function () {
        var root = document.documentElement;
        var btn = document.createElement('button');
        btn.id = 'theme-toggle';
        btn.type = 'button';
        var sync = function () {
          var dark = root.dataset.theme === 'dark';
          btn.textContent = dark ? 'Light' : 'Dark';
          btn.setAttribute(
            'aria-label',
            dark ? 'Switch to light theme' : 'Switch to dark theme'
          );
        };
        btn.addEventListener('click', function () {
          var next = root.dataset.theme === 'dark' ? 'light' : 'dark';
          root.dataset.theme = next;
          try { localStorage.setItem('hs-theme', next); } catch (e) {}
          sync();
        });
        document.body.appendChild(btn);
        sync();
      });
    }, window.$docsify.plugins || []);
  </script>

  <!-- "Edit this page on GitHub" link.  Inline (no dependency): an
       afterEach hook appends a footer link built from the configured
       repo and the current file. Skipped for the generated man page
       and for routes with no backing file (cover/home root). -->
  <script>
    window.$docsify.plugins = [].concat(function (hook, vm) {
      hook.afterEach(function (html, next) {
        var file = vm.route.file;
        if (!file || file === 'manual.md') { next(html); return; }
        var url = window.$docsify.repo + '/blob/main/docs/' + file;
        next(
          html +
          '<p class="edit-page"><a href="' + url +
          '" target="_blank" rel="noopener">Edit this page on GitHub</a></p>'
        );
      });
    }, window.$docsify.plugins || []);
  </script>

  <!-- Prism core + bundled languages -->
  <script src="vendor/prism.min.js"></script>
  <script src="vendor/prism-bash.min.js"></script>
  <script src="vendor/prism-json.min.js"></script>
  <script src="vendor/prism-yaml.min.js"></script>

  <!-- KDL Prism grammar (no maintained upstream package; minimal
       in-page definition is enough to colourise node names,
       properties, strings, and the #true/#false/#null literals). -->
  <script>
    Prism.languages.kdl = {
      'comment': {
        pattern: /\/\/.*|\/\*[\s\S]*?\*\//,
        greedy: true
      },
      'string': {
        pattern: /"(?:\\.|[^"\\])*"/,
        greedy: true
      },
      'boolean':  /#(?:true|false|null)\b/,
      'number':   /\b-?\d+(?:\.\d+)?\b/,
      'property': {
        pattern: /\b[a-zA-Z][\w-]*(?=\s*=)/,
        alias: 'attr-name'
      },
      'punctuation': /[{}=;\\]/,
      'keyword': {
        pattern: /^[ \t]*[a-zA-Z][\w-]*/m,
        alias: 'tag'
      }
    };
  </script>
</body>
</html>
